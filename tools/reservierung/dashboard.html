<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Reservierungen – Dashboard</title>
<style>
  :root { --bg: #14161a; --panel: #1c1f24; --line: rgba(255,255,255,.09);
          --accent: #c08a4e; --text: #eef0f2; --muted: #99a0a8;
          --ok: #6fbf8a; --warn: #e0b25a; --bad: #d97a6f; }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font-family: system-ui, sans-serif; }
  header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--line);
           display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: .5rem; }
  header h1 { font-size: 1.1rem; margin: 0; }
  header .sub { color: var(--muted); font-size: .8rem; }
  main { padding: 1.5rem; max-width: 900px; margin: 0 auto; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
           gap: .75rem; margin-bottom: 1.5rem; }
  .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
          padding: 1rem; }
  .stat .num { font-size: 1.6rem; font-weight: 600; }
  .stat .lbl { color: var(--muted); font-size: .75rem; margin-top: .25rem; }
  .tabs { display: flex; gap: .5rem; margin-bottom: 1rem; }
  .tabs button { background: var(--panel); color: var(--muted); border: 1px solid var(--line);
                 border-radius: 999px; padding: .4rem 1rem; cursor: pointer; font: inherit; font-size: .85rem; }
  .tabs button.active { background: var(--accent); color: #1b130a; border-color: var(--accent); font-weight: 600; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
          padding: 1rem 1.25rem; margin-bottom: .75rem;
          display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .card.neu { border-left: 3px solid var(--warn); }
  .card.bestaetigt { border-left: 3px solid var(--ok); }
  .card.storniert, .card.noshow { border-left: 3px solid var(--bad); opacity: .55; }
  .who { font-weight: 600; }
  .meta { color: var(--muted); font-size: .85rem; margin-top: .15rem; }
  .badge { font-size: .7rem; padding: .2rem .6rem; border-radius: 999px; text-transform: uppercase;
           letter-spacing: .05em; }
  .badge.neu { background: rgba(224,178,90,.15); color: var(--warn); }
  .badge.bestaetigt { background: rgba(111,191,138,.15); color: var(--ok); }
  .badge.storniert, .badge.noshow { background: rgba(217,122,111,.15); color: var(--bad); }
  .actions { display: flex; gap: .4rem; }
  .actions button { background: transparent; border: 1px solid var(--line); color: var(--text);
                    border-radius: 6px; padding: .35rem .7rem; cursor: pointer; font-size: .8rem; }
  .actions button:hover { border-color: var(--accent); color: var(--accent); }
  .empty { color: var(--muted); text-align: center; padding: 3rem 0; }
</style>
</head>
<body>
<header>
  <div>
    <h1 id="title">Reservierungen</h1>
    <div class="sub" id="subtitle"></div>
  </div>
  <div class="sub" id="clock"></div>
</header>
<main>
  <div class="stats">
    <div class="stat"><div class="num" id="s-today">0</div><div class="lbl">Reservierungen heute</div></div>
    <div class="stat"><div class="num" id="s-guests">0</div><div class="lbl">Gäste heute</div></div>
    <div class="stat"><div class="num" id="s-open">0</div><div class="lbl">Offene Anfragen</div></div>
    <div class="stat"><div class="num" id="s-week">0</div><div class="lbl">Nächste 7 Tage</div></div>
  </div>
  <div class="tabs">
    <button data-tab="heute" class="active">Heute</button>
    <button data-tab="kommend">Kommend</button>
    <button data-tab="alle">Alle</button>
  </div>
  <div id="list"></div>
</main>
<script src="store.js"></script>
<script>
(function () {
  'use strict';
  const params = new URLSearchParams(location.search);
  const restaurantId = params.get('r') || 'demo';
  ResvStore.seedDemo(restaurantId);

  document.getElementById('subtitle').textContent = 'Betrieb: ' + restaurantId;
  document.getElementById('clock').textContent =
    new Date().toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });

  let tab = 'heute';
  const today = new Date().toISOString().slice(0, 10);

  function inDays(dateStr, n) {
    const diff = (new Date(dateStr) - new Date(today)) / 86400000;
    return diff >= 0 && diff < n;
  }

  function fmtDate(d) { return d.split('-').reverse().join('.'); }

  function render() {
    const all = ResvStore.list(restaurantId)
      .slice()
      .sort(function (a, b) { return (a.date + a.time).localeCompare(b.date + b.time); });

    const todays = all.filter(function (r) { return r.date === today && r.status !== 'storniert'; });
    document.getElementById('s-today').textContent = todays.length;
    document.getElementById('s-guests').textContent =
      todays.reduce(function (s, r) { return s + r.guests; }, 0);
    document.getElementById('s-open').textContent =
      all.filter(function (r) { return r.status === 'neu'; }).length;
    document.getElementById('s-week').textContent =
      all.filter(function (r) { return inDays(r.date, 7) && r.status !== 'storniert'; }).length;

    let rows = all;
    if (tab === 'heute') rows = all.filter(function (r) { return r.date === today; });
    if (tab === 'kommend') rows = all.filter(function (r) { return r.date > today; });

    const list = document.getElementById('list');
    if (!rows.length) {
      list.innerHTML = '<div class="empty">Keine Reservierungen in dieser Ansicht.</div>';
      return;
    }
    list.innerHTML = rows.map(function (r) {
      const canAct = r.status === 'neu' || r.status === 'bestaetigt';
      return `
      <div class="card ${r.status}">
        <div>
          <div class="who">${r.name} · ${r.guests} Pers.</div>
          <div class="meta">${fmtDate(r.date)} um ${r.time} Uhr · ${r.phone}${r.note ? ' · „' + r.note + '“' : ''}</div>
        </div>
        <span class="badge ${r.status}">${r.status}</span>
        <div class="actions">
          ${r.status === 'neu' ? `<button data-act="bestaetigt" data-id="${r.id}">Bestätigen</button>` : ''}
          ${canAct ? `<button data-act="storniert" data-id="${r.id}">Stornieren</button>` : ''}
          ${r.status === 'bestaetigt' && r.date <= today ? `<button data-act="noshow" data-id="${r.id}">No-Show</button>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('list').addEventListener('click', function (e) {
    const btn = e.target.closest('button[data-act]');
    if (!btn) return;
    ResvStore.setStatus(restaurantId, btn.dataset.id, btn.dataset.act);
    render();
  });

  document.querySelector('.tabs').addEventListener('click', function (e) {
    const btn = e.target.closest('button[data-tab]');
    if (!btn) return;
    tab = btn.dataset.tab;
    document.querySelectorAll('.tabs button').forEach(function (b) {
      b.classList.toggle('active', b === btn);
    });
    render();
  });

  /* Neue Reservierungen aus dem Widget (anderer Tab) live übernehmen. */
  window.addEventListener('storage', render);

  render();
})();
</script>
</body>
</html>
